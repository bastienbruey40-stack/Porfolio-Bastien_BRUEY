<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Statistiques - FC Chalosse</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            padding: 20px; 
            text-align: center; 
            margin: 0;
        }
        .container { 
            max-width: 850px; 
            margin: auto; 
            padding-bottom: 30px; 
        }
        
        h1 { 
            background: #1a1a1a; 
            color: #ffcc00; 
            padding: 15px; 
            border-radius: 12px; 
            border: 2px solid #1a1a1a; 
            margin-top: 10px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        
        .card { 
            background: #fffce6; 
            padding: 15px; 
            border-radius: 12px; 
            border: 2px solid #1a1a1a; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            overflow-x: auto; /* Permet de scroller le tableau sur mobile si besoin */
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white; 
            min-width: 500px; 
        }
        
        th, td { 
            padding: 12px 8px; 
            border: 1px solid #1a1a1a; 
            text-align: center; 
            font-size: 0.95em; 
        }
        
        th { 
            background-color: #1a1a1a; 
            color: #ffcc00; 
            font-weight: bold; 
        }
        
        .nom-joueur { 
            text-align: left; 
            font-weight: bold; 
            background: #fffce6; 
        }
        
        .btn-retour { 
            display: inline-block; 
            margin-top: 20px; 
            background: #1a1a1a; 
            color: #ffcc00; 
            padding: 10px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            border: 2px solid #1a1a1a; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 Statistiques Saison</h1>
        
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th style="text-align: left;">Joueur</th>
                        <th>MJ</th>
                        <th>⚽</th>
                        <th>🎯</th>
                        <th>⭐ Moy.</th>
                        <th>🟨</th>
                        <th>🟥</th>
                    </tr>
                </thead>
                <tbody id="corps-table">
                    <tr><td colspan="7">Calcul en cours...</td></tr>
                </tbody>
            </table>
        </div>
        
        <a href="index.html" class="btn-retour">🔙 Retour à l'accueil</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function calculerStats() {
            try {
                // 1. Charger tous les joueurs pour créer la base du tableau
                const joueursRef = await getDocs(collection(db, "utilisateurs"));
                let statsGlobales = {};
                
                joueursRef.forEach(doc => {
                    let data = doc.data();
                    if (data.role === "joueur") {
                        statsGlobales[doc.id] = { 
                            nom: `${data.prenom} ${data.nom}`, 
                            mj: 0, buts: 0, passes: 0, jaunes: 0, rouges: 0, 
                            totalNotes: 0, nbVotes: 0 
                        };
                    }
                });

                // 2. Charger les matchs pour compter les Matchs Joués (MJ), Buts, Passes et Cartons
                const matchsRef = await getDocs(collection(db, "matchs"));
                matchsRef.forEach(doc => {
                    let d = doc.data();
                    let compo = d.compo || [];
                    let sMatch = d.stats_joueurs || {};

                    // Ajout +1 aux Matchs Joués (MJ) pour les joueurs dans la compo
                    compo.forEach(id => { 
                        if(statsGlobales[id]) {
                            statsGlobales[id].mj++; 
                        }
                    });

                    // Addition des Buts, Passes, Cartons (avec parseInt pour forcer le format nombre)
                    for (let id in sMatch) {
                        if (statsGlobales[id]) {
                            statsGlobales[id].buts += (parseInt(sMatch[id].buts) || 0);
                            statsGlobales[id].passes += (parseInt(sMatch[id].passes) || 0);
                            statsGlobales[id].jaunes += (parseInt(sMatch[id].jaunes) || 0);
                            statsGlobales[id].rouges += (parseInt(sMatch[id].rouges) || 0);
                        }
                    }
                });

                // 3. Charger les notes pour calculer la Moyenne (⭐ Moy.)
                const notesRef = await getDocs(collection(db, "notes"));
                notesRef.forEach(doc => {
                    let n = doc.data();
                    // Récupération de l'ID du joueur, sécurisée si la structure a changé
                    let joueurId = n.joueurId || doc.id.split('_')[1];

                    if (statsGlobales[joueurId]) {
                        statsGlobales[joueurId].totalNotes += parseFloat(n.note);
                        statsGlobales[joueurId].nbVotes++;
                    }
                });

                // 4. Génération de l'affichage HTML et tri par Buts puis par MJ
                let liste = Object.values(statsGlobales).sort((a, b) => b.buts - a.buts || b.mj - a.mj);
                let html = "";
                
                liste.forEach(s => {
                    let moyenne = s.nbVotes > 0 ? (s.totalNotes / s.nbVotes).toFixed(1) : "-";
                    html += `
                        <tr>
                            <td class="nom-joueur">${s.nom}</td>
                            <td>${s.mj}</td>
                            <td style="color:#28a745; font-weight:bold; font-size:1.1em;">${s.buts}</td>
                            <td style="color:#17a2b8; font-weight:bold; font-size:1.1em;">${s.passes}</td>
                            <td style="font-weight:bold;">${moyenne}</td>
                            <td style="color:#d39e00; font-weight:bold; font-size:1.1em;">${s.jaunes}</td>
                            <td style="color:#dc3545; font-weight:bold; font-size:1.1em;">${s.rouges}</td>
                        </tr>`;
                });

                const corps = document.getElementById('corps-table');
                if (html === "") {
                    corps.innerHTML = "<tr><td colspan='7'>Aucun joueur dans la base de données.</td></tr>";
                } else {
                    corps.innerHTML = html;
                }

            } catch (error) {
                console.error("Erreur lors du calcul des statistiques :", error);
                document.getElementById('corps-table').innerHTML = "<tr><td colspan='7' style='color:red; font-weight:bold;'>Erreur de chargement des statistiques.</td></tr>";
            }
        }

        // Lancement de la fonction
        calculerStats();
    </script>
</body>
</html>
