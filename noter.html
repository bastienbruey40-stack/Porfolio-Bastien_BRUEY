<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noter un joueur - FC Chalosse</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 100%; margin: 10px 0; padding: 15px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1.5em; text-align: center; }
        .btn { background: #007bff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-retour { display: inline-block; margin-top: 20px; background: #6c757d; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; }
        
        /* Zone pour le message "Déjà noté" */
        #message-deja-note { display: none; background: #e9ecef; color: #495057; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.95em; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="nom-joueur">Chargement...</h2>
        
        <!-- Le message qui apparaîtra si la note existe déjà -->
        <div id="message-deja-note"></div>

        <p>Attribue une note sur 10 (ex: 7.5 ou 7,5)</p>
        
        <input type="number" id="note" min="0" max="10" step="0.5" placeholder="Ex: 6.5">
        
        <button class="btn" id="btn-valider" onclick="enregistrerNote()">Valider la note</button>
        <br>
        <a href="index.html" class="btn-retour">Annuler et retourner à l'accueil</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const joueurId = urlParams.get('id');
        const matchId = urlParams.get('match');

        let utilisateurConnecte = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                utilisateurConnecte = user;
                // Dès qu'on sait qui est connecté, on vérifie s'il a déjà noté ce joueur
                verifierNoteExistante();
            } else {
                alert("Tu dois être connecté pour pouvoir voter !");
                window.location.href = "connexion.html";
            }
        });

        async function chargerJoueur() {
            if(!joueurId) return;
            const docSnap = await getDoc(doc(db, "utilisateurs", joueurId));
            if (docSnap.exists()) {
                document.getElementById('nom-joueur').innerText = "Noter " + docSnap.data().prenom + " " + docSnap.data().nom;
            } else {
                document.getElementById('nom-joueur').innerText = "Joueur introuvable";
            }
        }
        
        chargerJoueur();

        // NOUVELLE FONCTION : Vérifie si une note est déjà dans la base
        async function verifierNoteExistante() {
            if (!matchId || !joueurId || !utilisateurConnecte) return;
            
            const identifiantUnique = `${matchId}_${joueurId}_${utilisateurConnecte.uid}`;
            const docSnap = await getDoc(doc(db, "notes", identifiantUnique));
            
            if (docSnap.exists()) {
                const notePrecedente = docSnap.data().note;
                
                // On affiche le message
                const divMessage = document.getElementById('message-deja-note');
                divMessage.style.display = "block";
                divMessage.innerHTML = `✅ Tu as déjà donné la note de <b>${notePrecedente}/10</b> à ce joueur. Tu peux la modifier ci-dessous.`;
                
                // On pré-remplit le champ
                document.getElementById('note').value = notePrecedente;
                
                // On change le texte du bouton
                document.getElementById('btn-valider').innerText = "Mettre à jour ma note";
            }
        }

        window.enregistrerNote = async function() {
            if (!utilisateurConnecte) return alert("Erreur : tu n'es pas connecté !");
            if (!matchId) return alert("Erreur : aucun match n'a été sélectionné.");

            const valeurNote = parseFloat(document.getElementById('note').value);

            if (isNaN(valeurNote) || valeurNote < 0 || valeurNote > 10) {
                alert("Merci de rentrer une note valide comprise entre 0 et 10 !");
                return;
            }

            try {
                const identifiantUnique = `${matchId}_${joueurId}_${utilisateurConnecte.uid}`;

                await setDoc(doc(db, "notes", identifiantUnique), {
                    joueur_id: joueurId,
                    match_id: matchId,
                    votant_id: utilisateurConnecte.uid,
                    note: valeurNote,
                    date: new Date().toISOString()
                });

                
                // On retourne sur la page de détail du match, pas sur l'accueil !
                window.location.href = `match_detail.html?match=${matchId}`;
            } catch (e) {
                alert("❌ Erreur lors de l'enregistrement : " + e.message);
            }
        }
    </script>
</body>
</html>
