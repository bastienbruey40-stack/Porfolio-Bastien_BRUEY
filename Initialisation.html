<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Initialisation du Club Chalosse</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .box { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #status { font-weight: bold; margin-top: 20px; font-size: 1.2em; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🏉 Initialisation Firebase</h1>
        <p>Création des collections et des premières données...</p>
        <div id="status">Action en cours...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Ta config que tu viens de trouver
        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20",
            measurementId: "G-CDJC1RMEHQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const statusDiv = document.getElementById('status');

        async function init() {
            try {
                // 1. SAISONS
                const saisonRef = await addDoc(collection(db, "saisons"), { nom: "2023-2024" });

                // 2. UTILISATEURS (Toi !)
                const joueurRef = await addDoc(collection(db, "utilisateurs"), {
                    nom: "Bastiat",
                    prenom: "Bastien",
                    role: "joueur",
                    poste: "Gardien" // Terme foot
                });

                // 3. MATCHS
                const matchRef = await addDoc(collection(db, "matchs"), {
                    adversaire: "FC Doazit", // Un derby !
                    date: "2024-05-13",
                    saison_id: saisonRef.id
                });

                // 4. NOTES (Une note de test)
                await addDoc(collection(db, "notes"), {
                    joueur_id: joueurRef.id,
                    match_id: matchRef.id,
                    note: 8, // Sur 10 au foot c'est propre
                    commentaire: "Clean sheet et bel arrêt réflexe !"
                });

                statusDiv.innerHTML = "<span class='success'>✅ Base FOOTBALL initialisée !</span>";
            } catch (e) {
                statusDiv.innerHTML = "<span class='error'>❌ Erreur : " + e.message + "</span>";
            }
        }

        init();
    </script>
</body>
</html>
