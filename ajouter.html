<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un joueur - FC Chalosse</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select { width: 100%; margin: 10px 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-retour { display: inline-block; margin-top: 20px; background: #6c757d; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>➕ Nouvelle Recrue</h2>
        
        <label style="text-align: left; display: block;">Prénom :</label>
        <input type="text" id="prenom" placeholder="Ex: Zinedine">
        
        <label style="text-align: left; display: block; margin-top: 10px;">Nom :</label>
        <input type="text" id="nom" placeholder="Ex: Zidane">
        
        <label style="text-align: left; display: block; margin-top: 10px;">Poste :</label>
        <select id="poste">
            <option value="Gardien">Gardien</option>
            <option value="Défenseur">Défenseur</option>
            <option value="Milieu">Milieu</option>
            <option value="Attaquant">Attaquant</option>
            <option value="Coach">Coach</option>
        </select>
        
        <button class="btn" onclick="ajouterJoueur()">Ajouter à l'effectif</button>
        <br>
        <a href="index.html" class="btn-retour">Annuler et retourner à l'accueil</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.ajouterJoueur = async function() {
            const prenomVal = document.getElementById('prenom').value;
            const nomVal = document.getElementById('nom').value;
            const posteVal = document.getElementById('poste').value;

            if(prenomVal === "" || nomVal === "") {
                alert("Merci de remplir le nom et le prénom !");
                return;
            }

            try {
                // On ajoute le joueur dans la collection "utilisateurs" avec le rôle "joueur"
                await addDoc(collection(db, "utilisateurs"), {
                    prenom: prenomVal,
                    nom: nomVal,
                    poste: posteVal,
                    role: "joueur" 
                });
                alert("✅ Joueur ajouté avec succès !");
                window.location.href = "index.html"; // Retour automatique à l'accueil
            } catch (e) {
                alert("❌ Erreur lors de l'ajout : " + e.message);
            }
        }
    </script>
</body>
</html>
