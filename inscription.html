<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Inscription - FC Chalosse</title>
    
    <link rel="apple-touch-icon" href="chalosse.webp">
    <link rel="icon" href="chalosse.webp">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; margin: 0; }
        .card { background: #fffce6; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border: 2px solid #1a1a1a; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        h1 { margin-top: 0; color: #1a1a1a; font-size: 1.8em; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo-header { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #ffcc00; }
        
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 2px solid #1a1a1a; font-size: 1em; }
        
        .btn { background: #ffcc00; color: #1a1a1a; border: 2px solid #1a1a1a; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; margin-top: 15px; }
        .btn:hover { background: #ffea00; }
        
        .lien { display: block; margin-top: 20px; color: #1a1a1a; text-decoration: none; font-weight: bold; }
        .lien:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <h1><img src="chalosse.webp" alt="Logo FC Chalosse" class="logo-header"> Inscription</h1>
        <p style="color: #444; font-size: 0.9em; margin-bottom: 20px;">Rejoignez l'application du club !</p>

        <!-- Formulaire avec Nom et Prénom -->
        <input type="text" id="in-prenom" placeholder="Prénom" required>
        <input type="text" id="in-nom" placeholder="Nom de famille" required>
        <input type="email" id="in-email" placeholder="Adresse Email" required>
        <input type="password" id="in-password" placeholder="Mot de passe (6 car. min)" required>

        <button class="btn" id="btn-inscrire">S'inscrire</button>

        <a href="connexion.html" class="lien">Déjà un compte ? Connectez-vous</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // TA CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        document.getElementById('btn-inscrire').addEventListener('click', async () => {
            const prenom = document.getElementById('in-prenom').value.trim();
            const nom = document.getElementById('in-nom').value.trim();
            const email = document.getElementById('in-email').value.trim();
            const password = document.getElementById('in-password').value;

            // Vérification que tous les champs sont remplis
            if (!prenom || !nom || !email || !password) {
                alert("Veuillez remplir tous les champs !");
                return;
            }

            try {
                // 1. Firebase crée le compte (email/mot de passe)
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. On enregistre la fiche du joueur dans Firestore avec son nom et prénom
                await setDoc(doc(db, "utilisateurs", user.uid), {
                    prenom: prenom,
                    nom: nom,
                    email: email,
                    role: "utilisateur" // Par défaut, tout nouveau compte est un simple joueur
                });

                alert("✅ Compte créé avec succès ! Bienvenue au FC Chalosse.");
                window.location.href = "index.html"; // On redirige vers l'accueil

            } catch (error) {
                console.error("Erreur d'inscription:", error);
                if (error.code === 'auth/email-already-in-use') {
                    alert("Cette adresse email est déjà utilisée.");
                } else if (error.code === 'auth/weak-password') {
                    alert("Le mot de passe doit faire au moins 6 caractères.");
                } else {
                    alert("Erreur lors de l'inscription : " + error.message);
                }
            }
        });
    </script>
</body>
</html>
