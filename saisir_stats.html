<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Saisir les Stats - FC Chalosse</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .card { background: #fffce6; padding: 20px; border-radius: 12px; max-width: 600px; margin: auto; border: 2px solid #1a1a1a; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: 2px solid #1a1a1a; font-size: 1em; background: white; }
        .btn { background: #6f42c1; color: white; border: 2px solid #1a1a1a; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; text-transform: uppercase; }
        .btn-retour { display: inline-block; margin-top: 20px; background: #6c757d; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; border: 2px solid #1a1a1a; }
        .joueur-ligne { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; text-align: left; }
        .joueur-nom { font-weight: bold; color: #1a1a1a; flex: 1; }
        .inputs-stats { display: flex; gap: 8px; }
        .inputs-stats div { display: flex; flex-direction: column; align-items: center; }
        .inputs-stats label { font-size: 0.7em; font-weight: bold; margin-bottom: 2px; }
        .inputs-stats input { width: 40px; text-align: center; padding: 5px; border-radius: 5px; border: 2px solid #1a1a1a; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="background:#1a1a1a; color:#ffcc00; padding:10px; border-radius:8px;">📝 Stats du Match</h2>
        
        <select id="select-match">
            <option value="">-- Choisir un match --</option>
        </select>

        <div id="liste-effectif" style="margin-top: 20px;"></div>
        
        <button class="btn" onclick="enregistrerStats()" style="display:none;" id="btn-save">💾 Enregistrer les Stats</button>
        <br>
        <a href="index.html" class="btn-retour">Annuler</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const selectMatch = document.getElementById('select-match');
        // Déclenche le chargement des joueurs quand on change de match dans le menu déroulant
        selectMatch.addEventListener('change', chargerJoueursMatch);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "utilisateurs", user.uid));
                if (docSnap.exists() && docSnap.data().role === "admin") chargerMatchs();
                else window.location.href = "index.html";
            } else window.location.href = "connexion.html";
        });

        async function chargerMatchs() {
            const querySnapshot = await getDocs(collection(db, "matchs"));
            let options = "<option value=''>-- Choisir un match --</option>";
            querySnapshot.forEach((doc) => {
                let d = doc.data();
                options += `<option value="${doc.id}">[${d.equipe_type === "premiere" ? "1ère" : "Rés."}] ${d.adversaire} (${d.date})</option>`;
            });
            selectMatch.innerHTML = options;
        }

        async function chargerJoueursMatch() {
            const matchId = selectMatch.value;
            const conteneur = document.getElementById('liste-effectif');
            const btnSave = document.getElementById('btn-save');
            
            if (!matchId) { conteneur.innerHTML = ""; btnSave.style.display="none"; return; }
            conteneur.innerHTML = "Chargement...";

            const matchSnap = await getDoc(doc(db, "matchs", matchId));
            const matchData = matchSnap.data();
            const compo = matchData.compo || [];
            const statsExistantes = matchData.stats_joueurs || {};

            if (compo.length === 0) {
                conteneur.innerHTML = "<p style='color:red;'>⚠️ Aucune compo faite pour ce match !</p>";
                btnSave.style.display = "none";
                return;
            }

            const querySnapshot = await getDocs(collection(db, "utilisateurs"));
            let html = "";

            querySnapshot.forEach((jDoc) => {
                // N'affiche que les joueurs sélectionnés dans la compo
                if (compo.includes(jDoc.id)) {
                    let s = statsExistantes[jDoc.id] || {};
                    html += `
                        <div class="joueur-ligne" data-id="${jDoc.id}">
                            <span class="joueur-nom">${jDoc.data().prenom} ${jDoc.data().nom}</span>
                            <div class="inputs-stats">
                                <div><label>⚽</label><input type="number" min="0" class="in-buts" value="${s.buts || 0}"></div>
                                <div><label>🎯</label><input type="number" min="0" class="in-passes" value="${s.passes || 0}"></div>
                                <div><label>🟨</label><input type="number" min="0" max="2" class="in-jaunes" value="${s.jaunes || 0}"></div>
                                <div><label>🟥</label><input type="number" min="0" max="1" class="in-rouges" value="${s.rouges || 0}"></div>
                            </div>
                        </div>`;
                }
            });
            conteneur.innerHTML = html;
            btnSave.style.display = "block";
        }

        window.enregistrerStats = async function() {
            const matchId = selectMatch.value;
            const stats_joueurs = {};

            document.querySelectorAll('.joueur-ligne').forEach(ligne => {
                const joueurId = ligne.getAttribute('data-id');
                stats_joueurs[joueurId] = {
                    buts: parseInt(ligne.querySelector('.in-buts').value) || 0,
                    passes: parseInt(ligne.querySelector('.in-passes').value) || 0,
                    jaunes: parseInt(ligne.querySelector('.in-jaunes').value) || 0,
                    rouges: parseInt(ligne.querySelector('.in-rouges').value) || 0
                };
            });

            try {
                await updateDoc(doc(db, "matchs", matchId), { stats_joueurs: stats_joueurs });
                alert("✅ Stats enregistrées !");
                window.location.href = "stats.html"; // Renvoie vers le tableau global après la saisie
            } catch (e) { alert("Erreur : " + e.message); }
        }
    </script>
</body>
</html>
