<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un match - FC Chalosse</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select { width: 100%; margin: 10px 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-retour { display: inline-block; margin-top: 20px; background: #6c757d; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📅 Nouveau Match</h2>
        
        <label style="text-align: left; display: block;">Équipe concernée :</label>
        <select id="equipe_type">
            <option value="premiere">🔵 Équipe Première</option>
            <option value="reserve">🟢 Équipe Réserve</option>
        </select>

        <label style="text-align: left; display: block; margin-top: 10px;">Nom de l'adversaire :</label>
        <input type="text" id="adversaire" placeholder="Ex: FC Doazit">
        
        <label style="text-align: left; display: block; margin-top: 10px;">Date du match :</label>
        <input type="date" id="date">
        
        <label style="text-align: left; display: block; margin-top: 10px;">Lien logo adverse (Optionnel) :</label>
        <input type="url" id="logo" placeholder="https://...">
        
        <button class="btn" onclick="creerMatch()">Ajouter le match</button>
        <br>
        <a href="index.html" class="btn-retour">Annuler</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.creerMatch = async function() {
            const equipeType = document.getElementById('equipe_type').value;
            const adversaireVal = document.getElementById('adversaire').value;
            const dateVal = document.getElementById('date').value;
            const logoVal = document.getElementById('logo').value;

            if(adversaireVal === "" || dateVal === "") return alert("Remplis l'adversaire et la date !");

            try {
                await addDoc(collection(db, "matchs"), {
                    equipe_type: equipeType, // "premiere" ou "reserve"
                    adversaire: adversaireVal,
                    date: dateVal,
                    logo: logoVal,
                    compo: [] // On initialise une liste de joueurs vide pour ce match
                });
                alert("✅ Match ajouté !");
                window.location.href = "index.html";
            } catch (e) { alert("Erreur : " + e.message); }
        }
    </script>
</body>
</html>
